name: CI/CD — CounselAI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"
  REGISTRY:       ghcr.io
  IMAGE_PREFIX:   ${{ github.repository_owner }}/counselai

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Backend tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY:   test-secret-key-for-ci-only-32ch
          MODEL_SERVICE_URL: http://localhost:8001
        run: |
          pytest backend/app/tests/ model_service/ \
            -v \
            --cov=backend \
            --cov=model_service \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── 2. Backend linting ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check backend/ model_service/ --select=E,F,W,I
      - run: ruff format --check backend/ model_service/

  # ── 3. Frontend tests + build ─────────────────────────────────────────────────
  frontend-test:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build (production)
        working-directory: frontend
        env:
          VITE_API_URL: https://api.counselai.app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ── 4. Docker build (all images) ──────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms:  linux/amd64,linux/arm64

      - name: Build & push model service
        uses: docker/build-push-action@v5
        with:
          context: ./model_service
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-model:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-model:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: VITE_API_URL=https://api.counselai.app
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 5. Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety bandit

      - name: Dependency vulnerability scan
        run: safety check -r backend/requirements.txt --output text || true

      - name: Static security analysis (bandit)
        run: bandit -r backend/ model_service/ -ll --quiet || true

  # ── 6. Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/counselai
            git pull origin main
            
            # Pull new images
            docker compose pull
            
            # Rolling restart (zero-downtime)
            docker compose up -d --no-deps model-service
            sleep 10
            docker compose up -d --no-deps backend
            sleep 15
            docker compose up -d --no-deps frontend
            
            # Run migrations
            docker compose exec -T backend alembic upgrade head
            
            # Clean up old images
            docker image prune -f
            
            echo "✅ Deployment complete — $(date)"

      - name: Notify deployment
        if: always()
        run: |
          echo "Deploy status: ${{ job.status }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
