  <text x="230" y="440" font-size="8" fill="#4a4a5a">• Background tasks (no queue)</text>
  <text x="230" y="452" font-size="8" fill="#4a4a5a">• DB connection pooling</text>
  <text x="230" y="464" font-size="8" fill="#4a4a5a">• TanStack Query (React cache)</text>
  <text x="230" y="476" font-size="8" fill="#4a4a5a">• Nginx gzip + asset caching</text>
  <text x="230" y="488" font-size="8" fill="#4a4a5a">• Polling with smart intervals</text>

