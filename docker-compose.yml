version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  CounselAI — Full Stack Docker Compose
#
#  Services:
#    postgres      – PostgreSQL 16 (persistent volume)
#    redis         – Redis 7 (session cache, task queue)
#    backend       – FastAPI (auth, contracts, REST API)
#    model-service – AI analysis microservice (LLM or rule-based)
#    frontend      – React + Nginx (SPA)
#
#  Quick start:
#    cp .env.example .env
#    docker compose up -d
#    docker compose exec backend alembic upgrade head
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  TZ: UTC
  PYTHONUNBUFFERED: "1"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       counselai
      POSTGRES_USER:     counselai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counselai -d counselai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [counselai-net]

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [counselai-net]

  # ── Model Service ───────────────────────────────────────────────────────────
  model-service:
    build:
      context: .
      dockerfile: Dockerfile.model
    restart: unless-stopped
    environment:
      <<: *common-env
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [counselai-net]

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-service:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL:        postgresql+asyncpg://counselai:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/counselai
      REDIS_URL:           redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      MODEL_SERVICE_URL:   http://model-service:8001
      SECRET_KEY:          ${SECRET_KEY:-change-me-32-char-random-string-here}
      UPLOAD_DIR:          /app/uploads
      ALLOWED_ORIGINS:     '["http://localhost:3000","http://localhost","https://counselai.app"]'
      ENVIRONMENT:         ${ENVIRONMENT:-production}
      DEBUG:               ${DEBUG:-false}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [counselai-net]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [counselai-net]

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:  { driver: local }
  redis_data:     { driver: local }
  uploads_data:   { driver: local }

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  counselai-net:
    driver: bridge
